<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大崎下島 Memory Gacha</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --sea-blue: #0077be;
            --cloud-white: #ffffff;
            --mikan-orange: #ff8c00;
            --sand-beige: #fdf5e6;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--sand-beige); margin: 0; overflow-x: hidden; color: #333; }
        
        /* メニュー切り替え用 */
        .page { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--sea-blue); text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .card { background: var(--cloud-white); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 2px solid var(--sea-blue); }

        /* マップのピン名表示 */
        .leaflet-tooltip-own { background: var(--sea-blue); color: white; border: none; font-weight: bold; border-radius: 5px; }

        /* ガチャボタン */
        .gacha-btn { padding: 15px; border-radius: 50px; border: none; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .unlocked { background: var(--mikan-orange); color: white; box-shadow: 0 4px 15px rgba(255,140,0,0.4); }
        .locked { background: #ccc; color: #777; }

        /* 🍊 メニューボタン */
        #menu-trigger {
            position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px;
            background: var(--mikan-orange); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 35px; cursor: pointer; z-index: 10000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid white;
        }

        /* 図鑑グリッド */
        #encyclopedia { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item { background: #eee; aspect-ratio: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; border: 1px dashed var(--sea-blue); }
        .acquired { background: var(--cloud-white); color: var(--mikan-orange); border: 2px solid var(--mikan-orange); font-weight: bold; }

        /* ガチャモーダルは前回同様 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20000; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .detail-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        #map { height: 400px; width: 100%; border-radius: 15px; border: 2px solid var(--sea-blue); }
    </style>
</head>
<body>

    <div id="menu-trigger" onclick="toggleMenu()">🍊</div>

    <div id="page-menu" class="page">
        <h1>メニュー</h1>
        <div class="card" onclick="showPage('map')">🗺️ 冒険マップへ</div>
        <div class="card" onclick="showPage('collection')">📖 図鑑を見る</div>
        <div class="card" onclick="alert('準備中...')">📸 写真を投稿する</div>
    </div>

    <div id="page-map" class="page active">
        <h1>冒険の地図</h1>
        <div id="map"></div>
        <div id="status-card" class="card" style="margin-top:15px;">
            <div id="distance-info">位置情報を取得中...</div>
            <div id="spot-area" style="display:none; margin-top:10px;">
                <h2 id="spot-name" style="margin:5px 0; color:var(--mikan-orange);"></h2>
                <p id="spot-story" style="font-size:14px;"></p>
                <button id="gachaButton" class="gacha-btn">ガチャを回す</button>
            </div>
        </div>
    </div>

    <div id="page-collection" class="page">
        <h1>大崎下島の記憶</h1>
        <div class="card">
            <div id="visited-count">訪問数: 0 / 5</div>
            <div id="encyclopedia"></div>
        </div>
    </div>

    <div id="gacha-modal" class="modal-overlay">
        <div id="gacha-content" style="display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地点データ
        const locations = [
            { id: 1, name: "さえき小見川店", lat: 35.84065, lon: 140.59935, story: "昔はマルヘイという名前のスーパーだった" },
            { id: 2, name: "マツモトキヨシ小見川店", lat: 35.84042, lon: 140.59823, story: "意外と21:45までやってるぞ！" },
            { id: 3, name: "ファミリーマート香取小見川店", lat: 35.85132, lon: 140.60941, story: "小見川はファミマの独壇場" },
            { id: 4, name: "小見川支所", lat: 35.84709, lon: 140.60249, story: "パスポート申請は佐原じゃないとできない！悲しい！" },
            { id: 5, name: "花藤", lat: 35.84156, lon: 140.59901, story: "コシアブラの天ぷらに出会えたら運が良い！" }
        ];

        const allItems = ["大崎レモン", "御手洗の街並み", "ハルさんの笑顔", "江戸時代の地図", "まめな食堂カレー", "瀬戸内の夕日", "とびしま海道の風", "レモンジュース", "島の猫", "黄金のみかん"];

        let state = JSON.parse(localStorage.getItem('runGachaState')) || { visitedIds: [], inventory: [] };

        // ページ切り替え
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if(pageId === 'map') setTimeout(() => map.invalidateSize(), 100);
        }
        function toggleMenu() { 
            const menu = document.getElementById('page-menu');
            menu.classList.contains('active') ? showPage('map') : showPage('menu');
        }

        // マップ初期化
        const map = L.map('map').setView([35.844, 140.600], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        locations.forEach(loc => {
            L.marker([loc.lat, loc.lon]).addTo(map)
             .bindTooltip(loc.name, {permanent: true, direction: 'top', className: 'leaflet-tooltip-own'});
        });

        let userMarker = null;

        function updatePosition() {
            navigator.geolocation.watchPosition((position) => {
                const { latitude, longitude } = position.coords;
                if (!userMarker) userMarker = L.circleMarker([latitude, longitude], {color: 'red', radius: 8}).addTo(map);
                userMarker.setLatLng([latitude, longitude]);

                let nearest = null;
                let minDist = Infinity;
                locations.forEach(loc => {
                    const d = getDist(latitude, longitude, loc.lat, loc.lon);
                    if(d < minDist) { minDist = d; nearest = loc; }
                });

                document.getElementById('distance-info').innerText = `最寄り: ${nearest.name} まで ${(minDist*1000).toFixed(0)}m`;
                
                if(minDist <= 0.03) {
                    document.getElementById('spot-area').style.display = 'block';
                    document.getElementById('spot-name').innerText = nearest.name;
                    document.getElementById('spot-story').innerText = nearest.story;
                    const btn = document.getElementById('gachaButton');
                    if(state.visitedIds.includes(nearest.id)) {
                        btn.className = "gacha-btn locked"; btn.innerText = "訪問済み"; btn.disabled = true;
                    } else {
                        btn.className = "gacha-btn unlocked"; btn.innerText = "ガチャを回す"; btn.disabled = false;
                        btn.onclick = () => spinGacha(nearest.id);
                    }
                } else {
                    document.getElementById('spot-area').style.display = 'none';
                }
            }, null, {enableHighAccuracy: true});
        }

        // ガチャロジック（被りなし）
        function spinGacha(locId) {
            // まだ持っていないアイテムを抽出
            const remainingItems = allItems.filter(item => !state.inventory.includes(item));
            
            if (remainingItems.length === 0) {
                alert("すべての記憶を集めました！コンプリートです！");
                return;
            }

            const spins = (state.visitedIds.length + 1 === 5) ? Math.min(10, remainingItems.length) : 1;
            let results = [];
            
            // 被りなしで抽選
            for(let i=0; i<spins; i++) {
                if(remainingItems.length > 0) {
                    const idx = Math.floor(Math.random() * remainingItems.length);
                    const picked = remainingItems.splice(idx, 1)[0];
                    state.inventory.push(picked);
                    results.push(picked);
                }
            }
            state.visitedIds.push(locId);
            showGachaEffect(results);
            save();
        }

        function showGachaEffect(results) {
            const modal = document.getElementById('gacha-modal');
            modal.style.display = 'flex';
            const content = document.getElementById('gacha-content');
            content.innerHTML = `<div style="font-size:80px; animation:shake 0.5s infinite;">🎁</div><h3>思い出を探索中...</h3>`;
            
            setTimeout(() => {
                let html = `<h2>✨ 獲得！ ✨</h2><div style="display:flex; flex-wrap:wrap; justify-content:center;">`;
                results.forEach(item => {
                    html += `<div style="background:var(--mikan-orange); padding:10px; margin:5px; border-radius:10px;">${item}</div>`;
                });
                html += `</div><button class="gacha-btn unlocked" style="margin-top:20px;" onclick="closeGacha()">図鑑にしまう</button>`;
                content.innerHTML = html;
            }, 2000);
        }

        function closeGacha() { document.getElementById('gacha-modal').style.display = 'none'; }
        function save() { 
            localStorage.setItem('runGachaState', JSON.stringify(state)); 
            renderEncyclopedia(); 
        }
        function renderEncyclopedia() {
            const container = document.getElementById('encyclopedia');
            container.innerHTML = '';
            allItems.forEach(item => {
                const div = document.createElement('div');
                const has = state.inventory.includes(item);
                div.className = 'item' + (has ? ' acquired' : '');
                div.innerText = has ? item : '?';
                container.appendChild(div);
            });
            document.getElementById('visited-count').innerText = `訪問数: ${state.visitedIds.length} / 5`;
        }
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        renderEncyclopedia();
        updatePosition();
    </script>
</body>
</html>
